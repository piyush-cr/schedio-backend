apiVersion: apps/v1
kind: Deployment
metadata:
  name: schedio-worker
  namespace: schedio
  labels:
    app: schedio
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schedio
      component: worker
  template:
    metadata:
      labels:
        app: schedio
        component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/REPLACE_ORG/schedio-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["bun", "run", "worker"]
          envFrom:
            - configMapRef:
                name: schedio-config
            - secretRef:
                name: schedio-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
