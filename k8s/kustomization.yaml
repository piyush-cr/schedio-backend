apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: schedio
resources:
  - namespace.yaml
  - configmap.yaml
  - api-deployment.yaml
  - worker-deployment.yaml
  - service.yaml
# To override image at apply time:
# kustomize edit set image schedio-backend=ghcr.io/YOUR_ORG/schedio-backend:latest
# Or: kustomize build k8s | envsubst | kubectl apply -f -
